name: Sphinx Deploy

on:
  workflow_call:
    inputs:
      path-to-doc:
        required: false
        type: string
        default: docs/_build/html
        description: The docs path name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --group docs
      - name: Build docs
        run: uv run sphinx-build docs ${INPUTS_PATH_TO_DOC}
        env:
          INPUTS_PATH_TO_DOC: ${{ inputs.path-to-doc }}
      - name: Upload docs build as artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: ${{ github.event.repository.name }}_docs
          path: ${{ github.workspace }}/${{ inputs.path-to-doc }}

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      # to deploy to Pages
      pages: write
      # to verify the deployment originates from an appropriate source
      id-token: write
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: ${{ github.event.repository.name }}_docs
